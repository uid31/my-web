<!DOCTYPE html>
<html>
<head>
    <title>ElectroShop - Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
</head>
<body class="main-body">

<!-- Toast Overlay -->
<div id="toast-overlay">
    <div class="toast-box" id="toast-box"></div>
</div>

<header>
    <h1>⚡ ElectroShop</h1>
    <nav>
        <a href="home.html" class="active">Home</a>
        <a href="checkout.html">🛒 Cart</a>
    </nav>
</header>

<section class="hero">
    <h2>Explore Our Latest Electronics</h2>
    <p>High-quality devices. Modern lifestyle.</p>
</section>

<section class="products">

<div class="product">
    <img src="images/laptop.png" alt="Laptop" onerror="this.style.background='#e8e4f0';this.style.height='160px';this.removeAttribute('src')">
    <h3>Laptop</h3>
    <p>$800</p>
    <button onclick="addToCart('Laptop',800)">Add to Cart</button>
</div>

<div class="product">
    <img src="images/phone.png" alt="Smartphone" onerror="this.style.background='#e8e4f0';this.style.height='160px';this.removeAttribute('src')">
    <h3>Smartphone</h3>
    <p>$500</p>
    <button onclick="addToCart('Smartphone',500)">Add to Cart</button>
</div>

<div class="product">
    <img src="images/headphones.png" alt="Headphones" onerror="this.style.background='#e8e4f0';this.style.height='160px';this.removeAttribute('src')">
    <h3>Headphones</h3>
    <p>$150</p>
    <button onclick="addToCart('Headphones',150)">Add to Cart</button>
</div>

<div class="product">
    <img src="images/watch.png" alt="Smart Watch" onerror="this.style.background='#e8e4f0';this.style.height='160px';this.removeAttribute('src')">
    <h3>Smart Watch</h3>
    <p>$250</p>
    <button onclick="addToCart('Smart Watch',250)">Add to Cart</button>
</div>

<div class="product">
    <img src="images/console.png" alt="Gaming Console" onerror="this.style.background='#e8e4f0';this.style.height='160px';this.removeAttribute('src')">
    <h3>Gaming Console</h3>
    <p>$600</p>
    <button onclick="addToCart('Gaming Console',600)">Add to Cart</button>
</div>

<div class="product">
    <img src="images/speaker.png" alt="Bluetooth Speaker" onerror="this.style.background='#e8e4f0';this.style.height='160px';this.removeAttribute('src')">
    <h3>Bluetooth Speaker</h3>
    <p>$120</p>
    <button onclick="addToCart('Bluetooth Speaker',120)">Add to Cart</button>
</div>

</section>
<script src="script.js"></script>
</body>
</html>
